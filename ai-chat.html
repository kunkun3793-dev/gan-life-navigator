<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>がんライフナビゲーターAI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #9FE1CB;
    --navy: #1a3a5c;
    --text: #1a1a1a;
    --text-sub: #666;
    --text-hint: #999;
    --bg: #f5f5f5;
    --bg-card: #ffffff;
    --border: rgba(0,0,0,0.08);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    -webkit-text-size-adjust: 100%;
    color: var(--text);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg-card);
    position: relative;
  }

  /* Header */
  #header {
    background: var(--green);
    padding: 14px 16px;
    padding-top: calc(14px + env(safe-area-inset-top, 0px));
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  #header-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #header-avatar svg { width: 20px; height: 20px; }
  #header-info { flex: 1; }
  #header-name {
    font-size: 15px;
    font-weight: 600;
    color: white;
    letter-spacing: 0.01em;
  }
  #header-status {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    margin-top: 1px;
  }
  #header-badge {
    background: #4ade80;
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* Messages area */
  #messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f0f4f2;
  }

  /* Date divider */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-hint);
    background: rgba(0,0,0,0.06);
    display: inline-block;
    padding: 3px 10px;
    border-radius: 10px;
    margin: 4px auto;
    align-self: center;
  }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 7px;
    max-width: 85%;
    animation: msgIn 0.2s ease-out;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.ai { align-self: flex-start; }
  .msg.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .msg-av {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
  }
  .msg.ai .msg-av {
    background: var(--green);
    color: white;
  }
  .msg.user .msg-av {
    background: #ddd;
    color: #666;
    font-size: 11px;
  }
  .msg-content { display: flex; flex-direction: column; gap: 2px; }
  .msg-name {
    font-size: 11px;
    color: var(--text-hint);
    padding-left: 2px;
  }
  .msg-bubble {
    padding: 10px 13px;
    font-size: 14px;
    line-height: 1.65;
    position: relative;
    word-break: break-word;
  }
  .msg.ai .msg-bubble {
    background: white;
    border-radius: 4px 16px 16px 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    color: var(--text);
  }
  .msg.user .msg-bubble {
    background: var(--green);
    border-radius: 16px 4px 16px 16px;
    color: white;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .msg-bubble p { margin-bottom: 7px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul {
    padding-left: 15px;
    margin: 5px 0;
  }
  .msg-bubble li { margin-bottom: 3px; }
  .msg-bubble strong { font-weight: 600; }
  .msg-time {
    font-size: 10px;
    color: var(--text-hint);
    align-self: flex-end;
    padding-bottom: 2px;
    flex-shrink: 0;
  }
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 4px;
  }
  .msg.user .msg-row { flex-direction: row-reverse; }

  /* Typing indicator */
  #typing {
    display: none;
    align-self: flex-start;
    gap: 7px;
    max-width: 85%;
  }
  #typing .msg-av {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--green);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .typing-bubble {
    background: white;
    border-radius: 4px 16px 16px 16px;
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-mid);
    animation: tdot 1.3s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes tdot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Suggestion chips */
  #chips {
    padding: 10px 12px 6px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: #f0f4f2;
    flex-shrink: 0;
  }
  #chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--green);
    background: white;
    color: var(--green-dark);
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:active {
    background: var(--green-light);
    transform: scale(0.96);
  }

  /* Input area */
  #input-wrap {
    background: white;
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bottom));
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 22px;
    padding: 9px 14px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    min-height: 40px;
    max-height: 110px;
    background: #f8f8f8;
    color: var(--text);
    outline: none;
    line-height: 1.5;
    -webkit-appearance: none;
    overflow-y: auto;
  }
  #user-input:focus {
    border-color: var(--green);
    background: white;
  }
  #user-input::placeholder { color: #bbb; }
  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #send-btn:active { transform: scale(0.92); background: var(--green-dark); }
  #send-btn:disabled { background: #ccc; }
  #send-btn svg { width: 18px; height: 18px; }

  /* Disclaimer */
  #disclaimer {
    text-align: center;
    font-size: 10px;
    color: var(--text-hint);
    padding: 4px 12px 2px;
    background: white;
    flex-shrink: 0;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div id="header-info">
      <div id="header-name">がんライフナビゲーターAI</div>
      <div id="header-status"><span id="header-badge"></span>制度・生活支援・相談先をご案内</div>
    </div>
  </div>

  <div id="messages">
    <div class="date-divider">今日</div>
    <div class="msg ai" id="welcome-msg">
      <div class="msg-av">AI</div>
      <div class="msg-content">
        <div class="msg-name">ナビゲーターAI</div>
        <div class="msg-row">
          <div class="msg-bubble">
            <p>はじめまして。がんライフナビゲーターAIです。</p>
            <p>治療費・仕事・生活のこと、どんなことでも一緒に整理します。</p>
            <p>今、いちばん気になっていることを教えてください。</p>
          </div>
          <div class="msg-time" id="welcome-time"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="typing" style="display:none; padding: 0 12px 8px; gap: 7px; align-items: flex-start;">
    <div class="msg-av" style="width:30px;height:30px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px;">AI</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div id="chips">
    <button class="chip" onclick="sendChip('医療費がいくらかかるか不安です')">💰 医療費が心配</button>
    <button class="chip" onclick="sendChip('仕事を休むかどうか悩んでいます')">💼 仕事との両立</button>
    <button class="chip" onclick="sendChip('高額療養費制度について教えてください')">📋 高額療養費</button>
    <button class="chip" onclick="sendChip('傷病手当金はもらえますか？')">💴 傷病手当金</button>
    <button class="chip" onclick="sendChip('脱毛やウィッグの助成はありますか？')">✨ ウィッグ助成</button>
    <button class="chip" onclick="sendChip('家族への伝え方がわかりません')">👨‍👩‍👧 家族への伝え方</button>
    <button class="chip" onclick="sendChip('一人暮らしで治療中の生活が不安です')">🏠 一人暮らしの不安</button>
  </div>

  <div id="disclaimer">医療判断・受給可否の断定はできません。制度確認は各窓口へ</div>

  <div id="input-wrap">
    <textarea id="user-input" placeholder="メッセージを入力..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script>
const SYSTEM = `あなたは「がんライフナビゲーターAI」です。
がんと診断された患者や家族が、制度・生活支援・相談先を整理できるようサポートします。

【役割】
- 医療費・収入・生活支援・外見ケア・仕事の5課題に対応する
- 「今何を確認すればいいか」をナビゲートする
- 患者の流れ（診断→治療→副作用→生活不安→社会復帰）を前提に回答する

【回答の構造（この順序で）】
①安心の言葉：患者の不安に共感する（1〜2文）
②状況整理：必要に応じて就労状況・健康保険の種類・入院/通院などを確認する
③制度や支援の方向性：関連する制度を説明する
④相談先：確認できる窓口を案内する
⑤次の行動：今すぐ確認するとよいことを1〜3個に絞って提示する

【主な制度】
- 高額療養費制度・限度額適用認定証（医療費負担軽減）
- 傷病手当金（会社員・給与約2/3・最長1年6ヶ月）
- 障害年金（がんでも対象の場合あり・就労中でも申請可）
- 医療費控除（確定申告で税軽減）
- 介護保険（40〜64歳でもがんは特定疾病として対象の場合あり）
- 訪問看護・在宅医療
- 医療用ウィッグ助成・乳房補整具助成（自治体ごとに異なる・購入前に確認）
- 両立支援制度・ハローワーク
- がん相談支援センター（全国無料・受診先以外でも可）

【重要な配慮】
- ステージ3以下の通院治療でも倦怠感・家事困難が起きる（生活支援を案内する）
- 医療判断をしない
- 制度受給可否を断定しない（「可能性があります」「確認が必要です」と表現する）
- 話を急がない・不安を否定しない
- 保険請求だけで終わらず生活支援や相談先も含めて伴走する

【回答スタイル】
- 温かく、わかりやすい言葉で
- スマホで読みやすいよう段落を短く
- 箇条書きを適切に使う
- 1回の回答は250〜350字程度
- 最後に「他に気になることがあれば何でも聞いてください」と添える`;

const msgs = [];
let loading = false;

function getTime() {
  const n = new Date();
  return `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
}

document.getElementById('welcome-time').textContent = getTime();

function parseText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^[#]+\s(.+)$/gm, '<strong>$1</strong>')
    .split('\n\n').map(para => {
      const lines = para.split('\n').filter(l => l.trim());
      if (!lines.length) return '';
      const isList = lines.every(l => /^[-・●①②③④⑤]/.test(l.trim()));
      if (isList) {
        return '<ul>' + lines.map(l =>
          `<li>${l.replace(/^[-・●①②③④⑤]\s*/, '')}</li>`
        ).join('') + '</ul>';
      }
      return '<p>' + lines.join('<br>') + '</p>';
    }).join('');
}

function appendMsg(role, text) {
  const container = document.getElementById('messages');
  const time = getTime();
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  if (role === 'ai') {
    wrap.innerHTML = `
      <div class="msg-av">AI</div>
      <div class="msg-content">
        <div class="msg-name">ナビゲーターAI</div>
        <div class="msg-row">
          <div class="msg-bubble">${parseText(text)}</div>
          <div class="msg-time">${time}</div>
        </div>
      </div>`;
  } else {
    wrap.innerHTML = `
      <div class="msg-av">私</div>
      <div class="msg-content">
        <div class="msg-row">
          <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
          <div class="msg-time">${time}</div>
        </div>
      </div>`;
  }

  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

function showTyping(show) {
  const t = document.getElementById('typing');
  t.style.display = show ? 'flex' : 'none';
  if (show) {
    const c = document.getElementById('messages');
    c.scrollTop = c.scrollHeight;
  }
}

async function callClaude(text) {
  msgs.push({ role: 'user', content: text });
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: msgs
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'すみません、もう一度お試しください。';
    msgs.push({ role: 'assistant', content: reply });
    return reply;
  } catch(e) {
    return 'ネットワークエラーが発生しました。もう一度お試しください。';
  }
}

async function sendMessage() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text || loading) return;

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('chips').style.display = 'none';

  loading = true;
  appendMsg('user', text);
  showTyping(true);

  const reply = await callClaude(text);
  showTyping(false);
  appendMsg('ai', reply);

  loading = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

function sendChip(text) {
  document.getElementById('user-input').value = text;
  document.getElementById('send-btn').disabled = false;
  sendMessage();
}

const inp = document.getElementById('user-input');
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
  document.getElementById('send-btn').disabled = inp.value.trim() === '';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (inp.value.trim()) sendMessage();
  }
});

// iOS キーボード対応
window.addEventListener('resize', () => {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
});
</script>
</body>
</html>
